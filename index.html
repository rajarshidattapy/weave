<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Component Search</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: sans-serif;
    }

    .card {
      background: #111;
      border: 1px solid #222;
    }

    .card:hover {
      border-color: #444;
      transform: translateY(-2px);
      transition: 0.2s ease;
    }
  </style>
</head>

<body class="min-h-screen p-10">

  <div class="max-w-7xl mx-auto">

    <!-- Header -->
    <div class="mb-10">
      <h1 class="text-4xl font-bold mb-2">
        Component Intelligence
      </h1>

      <p class="text-zinc-400">
        Search UI components across shadcn, Magic UI, Aceternity and more.
      </p>
    </div>

    <!-- Search -->
    <div class="flex gap-3 mb-10">

      <input
        id="searchInput"
        type="text"
        placeholder="Search for dark pricing section..."
        class="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl px-5 py-4 outline-none text-white"
      />

      <button
        onclick="searchComponents()"
        class="bg-white text-black px-6 rounded-xl font-medium"
      >
        Search
      </button>

    </div>

    <!-- Results -->
    <div
      id="results"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
    ></div>

  </div>

  <script>

    async function searchComponents() {

      const query = document.getElementById("searchInput").value

      const resultsContainer = document.getElementById("results")

      resultsContainer.innerHTML = `
        <div class="text-zinc-400">
          Loading components...
        </div>
      `

      try {

        // CHANGE THIS URL LATER
        const response = await fetch(
          `http://localhost:8000/search?q=${encodeURIComponent(query)}`
        )

        const data = await response.json()

        resultsContainer.innerHTML = ""

        if (!data.length) {

          resultsContainer.innerHTML = `
            <div class="text-zinc-500">
              No components found.
            </div>
          `

          return
        }

        data.forEach(component => {

          const card = document.createElement("div")

          card.className =
            "card rounded-2xl overflow-hidden"

          card.innerHTML = `
            <img
              src="${component.screenshot}"
              class="w-full h-64 object-cover border-b border-zinc-800"
            />

            <div class="p-5">

              <div class="flex items-center justify-between mb-3">

                <h2 class="text-lg font-semibold">
                  ${component.name}
                </h2>

                <span class="text-xs bg-zinc-800 px-2 py-1 rounded-lg">
                  ${component.source}
                </span>

              </div>

              <p class="text-zinc-400 text-sm mb-4">
                ${component.description || ""}
              </p>

              <div class="flex flex-wrap gap-2 mb-5">

                ${(component.tags || []).map(tag => `
                  <span class="text-xs bg-zinc-900 border border-zinc-800 px-2 py-1 rounded-lg">
                    ${tag}
                  </span>
                `).join("")}

              </div>

              <div class="flex gap-3">

                <a
                  href="${component.url}"
                  target="_blank"
                  class="flex-1 bg-white text-black text-center py-2 rounded-xl font-medium"
                >
                  Open
                </a>

                <button
                  onclick='viewCode(${JSON.stringify(component.code)})'
                  class="flex-1 bg-zinc-900 border border-zinc-800 py-2 rounded-xl"
                >
                  View Code
                </button>

              </div>

            </div>
          `

          resultsContainer.appendChild(card)

        })

      } catch (err) {

        console.error(err)

        resultsContainer.innerHTML = `
          <div class="text-red-500">
            Failed to fetch components.
          </div>
        `
      }
    }

    function viewCode(code) {

      const newWindow = window.open()

      newWindow.document.write(`
        <html>
          <head>
            <title>Component Code</title>

            <style>
              body {
                background: #0a0a0a;
                color: white;
                padding: 20px;
                font-family: monospace;
              }

              pre {
                white-space: pre-wrap;
                word-wrap: break-word;
              }
            </style>

          </head>

          <body>

            <pre>${code}</pre>

          </body>
        </html>
      `)
    }

  </script>

</body>
</html>
